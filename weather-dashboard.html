<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .datetime-container {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px 0;
        }

        .date {
            font-size: 1.4rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .time {
            font-size: 2.8rem;
            font-weight: 300;
            color: #2d3748;
            font-family: 'Arial', sans-serif;
            letter-spacing: -1px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .tab-button {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: #4a5568;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .tab-button:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .tab-button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .current-weather {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .temperature {
            font-size: 4.5rem;
            font-weight: 300;
            color: #2d3748;
            margin-bottom: 10px;
            font-family: 'Arial', sans-serif;
        }

        .weather-description {
            font-size: 1.5rem;
            color: #4a5568;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .location {
            font-size: 1.3rem;
            color: #718096;
            font-weight: 500;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
        }

        .forecast-day {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .forecast-temp {
            font-size: 2rem;
            font-weight: 300;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .detail-value {
            font-size: 2.5rem;
            font-weight: 300;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .detail-label {
            font-size: 1rem;
            color: #718096;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            
            .time {
                font-size: 2.2rem;
            }
            
            .temperature {
                font-size: 3.5rem;
            }
            
            .tabs {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .tab-button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="datetime-container">
            <div class="date" id="date"></div>
            <div class="time" id="time"></div>
        </div>
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('current')">Current</button>
            <button class="tab-button" onclick="switchTab('forecast')">Forecast</button>
            <button class="tab-button" onclick="switchTab('details')">Details</button>
        </div>
    </div>

    <div class="container">
        <!-- Current Weather Tab -->
        <div id="current" class="tab-content active">
            <div class="current-weather">
                <div class="temperature" id="current-temp">24°C</div>
                <div class="weather-description" id="current-desc">Partly Cloudy</div>
                <div class="location" id="current-location">New York, NY</div>
            </div>
        </div>

        <!-- Forecast Tab -->
        <div id="forecast" class="tab-content">
            <div class="forecast-grid">
                <div class="forecast-card">
                    <div class="forecast-day">Tomorrow</div>
                    <div class="forecast-temp">26°C</div>
                    <div class="forecast-icon">☀️</div>
                    <div>Sunny</div>
                </div>
                <div class="forecast-card">
                    <div class="forecast-day">Wed</div>
                    <div class="forecast-temp">23°C</div>
                    <div class="forecast-icon">⛅</div>
                    <div>Partly Cloudy</div>
                </div>
                <div class="forecast-card">
                    <div class="forecast-day">Thu</div>
                    <div class="forecast-temp">21°C</div>
                    <div class="forecast-icon">🌧️</div>
                    <div>Rainy</div>
                </div>
                <div class="forecast-card">
                    <div class="forecast-day">Fri</div>
                    <div class="forecast-temp">25°C</div>
                    <div class="forecast-icon">☁️</div>
                    <div>Cloudy</div>
                </div>
            </div>
        </div>

        <!-- Details Tab -->
        <div id="details" class="tab-content">
            <div class="details-grid">
                <div class="detail-card">
                    <div class="detail-value">65%</div>
                    <div class="detail-label">Humidity</div>
                </div>
                <div class="detail-card">
                    <div class="detail-value">12 km/h</div>
                    <div class="detail-label">Wind Speed</div>
                </div>
                <div class="detail-card">
                    <div class="detail-value">1013 hPa</div>
                    <div class="detail-label">Pressure</div>
                </div>
                <div class="detail-card">
                    <div class="detail-value">8km</div>
                    <div class="detail-label">Visibility</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Real-time date and time update
        function updateDateTime() {
            const now = new Date();
            
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            
            const dayName = days[now.getDay()];
            const monthName = months[now.getMonth()];
            const dateStr = `${dayName}, ${monthName} ${now.getDate()}, ${now.getFullYear()}`;
            
            const timeStr = now.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            
            document.getElementById('date').textContent = dateStr;
            document.getElementById('time').textContent = timeStr;
        }

        // Update time every second
        setInterval(updateDateTime, 1000);
        updateDateTime(); // Initial call

        // Tab switching functionality
        function switchTab(tabName) {
            // Hide all tab contents
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(content => content.classList.remove('active'));
            
            // Remove active class from all tab buttons
            const tabButtons = document.querySelectorAll('.tab-button');
            tabButtons.forEach(button => button.classList.remove('active'));
            
            // Show selected tab content
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to clicked button
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
